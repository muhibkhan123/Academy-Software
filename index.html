                                                                className="mt-1 h-5 w-5 text-blue-600 border-slate-300 rounded focus:ring-blue-500 cursor-pointer" 
                                                            />
                                                            <label htmlFor={`bankQ-${m.id}`} className="flex-1 cursor-pointer">
                                                                <span className="block font-semibold text-slate-800 text-sm">{m.q}</span>
                                                                <span className="block text-xs text-slate-400 mt-1">Choices: {m.options.join(' | ')}</span>
                                                            </label>
                                                        </div>
                                                    );
                                                })}
                                                {mcqBank.filter(m => m.subject === newTest.category).length === 0 && (
                                                    <div className="p-8 text-center text-slate-400 text-sm bg-white">
                                                        No questions found in MCQ Bank under category "{newTest.category}". Please write questions manually or import them first.
                                                    </div>
                                                )}
                                            </div>
                                            <div className="text-xs font-bold text-slate-500 flex justify-between px-2">
                                                <span>Selected Questions: {selectedBankIds.length}</span>
                                                <span>Default Mark Per Question: 5 Marks</span>
                                            </div>
                                        </div>
                                    )}

                                    {testCreationMode === 'manual' && (
                                        <div className="space-y-6">
                                            {newTest.questions.map((q, qIndex) => (
                                                <div key={qIndex} className="bg-slate-50 border border-slate-200 p-5 rounded-xl relative">
                                                    <div className="absolute top-4 right-4 text-xs font-bold text-slate-400">Q {qIndex + 1}</div>
                                                    <div className="flex justify-between items-center mb-2">
                                                        <label className="block text-sm font-semibold text-slate-700">Question Text *</label>
                                                        <div className="flex items-center space-x-2 bg-white px-2 py-1 rounded-md border border-slate-200">
                                                            <label className="text-xs font-semibold text-blue-600">Marks:</label>
                                                            <input type="number" min="1" required value={q.marks} onChange={e => handleManualQuestionChange(qIndex, 'marks', e.target.value)} className="w-16 p-1 text-sm border border-slate-300 rounded outline-none text-center font-mono" />
                                                        </div>
                                                    </div>
                                                    <input type="text" value={q.q} onChange={e => handleManualQuestionChange(qIndex, 'q', e.target.value)} required placeholder="Type the question here..." className="w-full border border-slate-300 p-2.5 rounded-lg outline-none focus:ring-2 focus:ring-blue-500 mb-4 bg-white" />
                                                    
                                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                                        {q.options.map((opt, optIndex) => (
                                                            <div key={optIndex} className="flex items-center space-x-2">
                                                                <input type="radio" name={`correct-${qIndex}`} checked={q.correct === optIndex} onChange={() => handleManualQuestionChange(qIndex, 'correct', optIndex)} className="w-4 h-4 text-blue-600 focus:ring-blue-500 cursor-pointer" title="Mark as correct answer" />
                                                                <input type="text" value={opt} onChange={e => handleManualOptionChange(qIndex, optIndex, e.target.value)} required placeholder={`Option ${optIndex + 1}`} className={`w-full border ${q.correct === optIndex ? 'border-emerald-500 bg-emerald-50' : 'border-slate-300 bg-white'} p-2 rounded-lg outline-none focus:border-blue-500 text-sm`} />
                                                            </div>
                                                        ))}
                                                    </div>
                                                    
                                                    {newTest.questions.length > 0 && (
                                                        <button type="button" onClick={() => removeManualQuestionField(qIndex)} className="text-xs text-rose-500 font-semibold mt-4 hover:text-rose-700">Remove Question</button>
                                                    )}
                                                </div>
                                            ))}
                                            
                                            <button type="button" onClick={addManualQuestionField} className="w-full py-3 border-2 border-dashed border-blue-300 text-blue-600 font-bold rounded-xl hover:bg-blue-50 transition">+ Add Another Manual Question</button>
                                        </div>
                                    )}
                                </div>

                                <div className="flex justify-end space-x-4 border-t pt-6 font-sans">
                                    <button type="button" onClick={() => { setShowCreateForm(false); setSelectedBankIds([]); }} className="px-6 py-2.5 bg-white border border-slate-300 rounded-lg hover:bg-slate-50 font-semibold text-slate-600">Cancel</button>
                                    <button type="submit" className="px-6 py-2.5 bg-blue-600 text-white rounded-lg hover:bg-blue-700 font-bold shadow-md">Publish Assessment</button>
                                </div>
                            </form>
                        </div>
                    )}

                    {/* --- VIEW STANDINGS & RESULTS --- */}
                    {activeSubTab === 'results' && (
                        <div className="space-y-4">
                            <div className="bg-white p-4 rounded-xl border border-slate-200 shadow-sm flex items-center gap-4">
                                <label className="text-sm font-bold text-slate-700 whitespace-nowrap">Filter by Assessment:</label>
                                <select value={selectedResultTest} onChange={e => setSelectedResultTest(e.target.value)} className="w-full md:w-96 border border-slate-300 p-2 rounded-lg outline-none focus:ring-2 focus:ring-blue-500 text-sm bg-slate-50">
                                    <option value="All">All Tests & Results</option>
                                    {myTests.map(t => <option key={t.id} value={t.id}>{t.title}</option>)}
                                </select>
                            </div>

                            <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                                <div className="overflow-x-auto">
                                    <table className="w-full text-left text-sm whitespace-nowrap">
                                        <thead className="bg-slate-50 text-slate-600 border-b border-slate-200">
                                            <tr>
                                                <th className="px-6 py-4 font-semibold tracking-wide">Rank</th>
                                                <th className="px-6 py-4 font-semibold tracking-wide">Student Info</th>
                                                <th className="px-6 py-4 font-semibold tracking-wide">Assessment Name</th>
                                                <th className="px-6 py-4 font-semibold tracking-wide text-center">MCQ Score</th>
                                                <th className="px-6 py-4 font-semibold tracking-wide text-center">Speech Marks</th>
                                                <th className="px-6 py-4 font-extrabold tracking-wide text-center text-blue-700">Total Marks</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-100">
                                            {filteredResults.map(result => {
                                                const student = students.find(s => s.id === result.studentId);
                                                const rank = ranksMap[result.id];
                                                const total = result.score + (result.speechMarks || 0);
                                                
                                                let rankBadge = "bg-slate-100 text-slate-600";
                                                if (rank === 1) rankBadge = "bg-yellow-100 text-yellow-700 border border-yellow-300";
                                                else if (rank === 2) rankBadge = "bg-slate-200 text-slate-700 border border-slate-400";
                                                else if (rank === 3) rankBadge = "bg-orange-100 text-orange-800 border border-orange-300";

                                                return (
                                                    <tr key={result.id} className="hover:bg-slate-50 transition-colors">
                                                        <td className="px-6 py-4">
                                                            <span className={`inline-flex items-center justify-center w-8 h-8 rounded-full font-bold shadow-sm ${rankBadge}`}>
                                                                {rank}
                                                            </span>
                                                        </td>
                                                        <td className="px-6 py-4">
                                                            <div className="font-bold text-slate-800">{student ? student.name : 'Unknown'}</div>
                                                            <div className="font-mono text-xs text-slate-400 mt-0.5">#{result.studentId}</div>
                                                        </td>
                                                        <td className="px-6 py-4 font-medium text-slate-600 text-xs whitespace-normal min-w-[200px]">{result.testTitle}</td>
                                                        <td className="px-6 py-4 text-center font-mono font-semibold text-slate-700">{result.score}</td>
                                                        <td className="px-6 py-4 text-center font-mono font-semibold text-amber-600">
                                                            {result.speechMarks || 0}
                                                            {result.speechCategory && (
                                                                <span className="block text-[9px] text-amber-500 font-sans tracking-tight">{result.speechCategory}</span>
                                                            )}
                                                        </td>
                                                        <td className="px-6 py-4 text-center font-mono font-extrabold text-blue-700 text-lg">{total}</td>
                                                    </tr>
                                                );
                                            })}
                                            {filteredResults.length === 0 && <tr><td colSpan="6" className="text-center py-10 text-slate-500 font-medium">No results found for selection.</td></tr>}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* --- SPEECH MARKS INPUT & MODIFICATION HISTORIES VIEW --- */}
                    {activeSubTab === 'speech' && (
                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                            <div className="lg:col-span-1 bg-white p-6 rounded-2xl shadow-sm border border-amber-200 h-fit">
                                <h3 className="text-lg font-bold text-amber-800 mb-4 flex items-center border-b border-amber-100 pb-3">
                                    <Award size={20} className="mr-2"/> {isEditingSpeech ? 'Modify Speech Marks' : 'Assign Speech Marks'}
                                </h3>
                                {canWrite ? (
                                    <form onSubmit={handleSpeechSave} className="space-y-4">
                                        <div>
                                            <label className="block text-sm font-semibold text-slate-700 mb-1">Select Assessment *</label>
                                            <select required disabled={isEditingSpeech} value={speechData.testId} onChange={e => setSpeechData({...speechData, testId: e.target.value, studentId: ''})} className="w-full border border-slate-300 p-2.5 rounded-lg outline-none focus:ring-2 focus:ring-amber-500 bg-slate-50 text-xs">
                                                <option value="">-- Choose Test --</option>
                                                {myTests.map(t => <option key={t.id} value={t.id}>{t.title}</option>)}
                                            </select>
                                        </div>
                                        
                                        <div>
                                            <label className="block text-sm font-semibold text-slate-700 mb-1">Select Student (Roll No) *</label>
                                            <select required disabled={isEditingSpeech} value={speechData.studentId} onChange={e => setSpeechData({...speechData, studentId: e.target.value})} className="w-full border border-slate-300 p-2.5 rounded-lg outline-none focus:ring-2 focus:ring-amber-500 bg-slate-50 text-xs">
                                                <option value="">-- Choose Student --</option>
                                                {testResults.filter(r => r.testId === parseInt(speechData.testId)).map(res => {
                                                    const s = students.find(st => st.id === res.studentId);
                                                    if (!s) return null;
                                                    return <option key={res.id} value={s.id}>{s.name} (Reg: #{s.id})</option>
                                                })}
                                            </select>
                                        </div>

                                        <div>
                                            <label className="block text-sm font-semibold text-slate-700 mb-1">Speech Category/Metric *</label>
                                            <select required value={speechData.category} onChange={e => setSpeechData({...speechData, category: e.target.value})} className="w-full border border-slate-300 p-2.5 rounded-lg outline-none focus:ring-2 focus:ring-amber-500 bg-white text-xs">
                                                {speechCategories.map(cat => (
                                                    <option key={cat} value={cat}>{cat}</option>
                                                ))}
                                            </select>
                                        </div>

                                        <div>
                                            <label className="block text-sm font-semibold text-slate-700 mb-1">Obtained Marks *</label>
                                            <input type="number" min="0" required value={speechData.marks} onChange={e => setSpeechData({...speechData, marks: e.target.value})} placeholder="e.g. 15" className="w-full border border-slate-300 p-2.5 rounded-lg outline-none focus:ring-2 focus:ring-amber-500 bg-white font-mono text-xs" />
                                        </div>

                                        <div>
                                            <label className="block text-sm font-semibold text-slate-700 mb-1">Teacher Description / Comments</label>
                                            <textarea rows="3" value={speechData.description} onChange={e => setSpeechData({...speechData, description: e.target.value})} placeholder="e.g. Exhibited superb vocabulary, fluent pronunciation..." className="w-full border border-slate-300 p-2.5 rounded-lg outline-none focus:ring-2 focus:ring-amber-500 bg-white text-xs resize-none"></textarea>
                                        </div>
                                        
                                        <div className="flex gap-2">
                                            {isEditingSpeech && (
                                                <button type="button" onClick={() => {
                                                    setSpeechData({ testId: '', studentId: '', marks: '', category: 'Pronunciation & Accent', description: '' });
                                                    setIsEditingSpeech(false);
                                                }} className="w-1/2 bg-slate-200 hover:bg-slate-300 text-slate-700 p-2.5 rounded-lg text-xs font-bold transition">
                                                    Cancel Edit
                                                </button>
                                            )}
                                            <button type="submit" className={`p-2.5 rounded-lg font-bold shadow-md transition-colors text-xs text-white ${isEditingSpeech ? 'w-1/2 bg-blue-600 hover:bg-blue-700' : 'w-full bg-amber-500 hover:bg-amber-600'}`}>
                                                {isEditingSpeech ? 'Update Marks' : 'Save Speech Marks'}
                                            </button>
                                        </div>
                                    </form>
                                ) : (
                                    <div className="text-sm text-rose-500 font-bold p-4 bg-rose-50 rounded-lg">You do not have permission to assign speech marks.</div>
                                )}
                            </div>

                            <div className="lg:col-span-2 bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                                <div className="p-4 border-b border-slate-100 bg-slate-50 flex items-center justify-between">
                                    <h3 className="font-bold text-slate-700">Speech Marks Overview & History</h3>
                                    {speechData.testId && <span className="text-xs font-bold bg-amber-100 text-amber-700 px-2 py-1 rounded">Filtered by Selected Test</span>}
                                </div>
                                <div className="overflow-x-auto">
                                    <table className="w-full text-left text-sm whitespace-nowrap">
                                        <thead className="bg-slate-50 text-slate-600 border-b border-slate-200">
                                            <tr>
                                                <th className="px-4 py-3 font-semibold">Student Name</th>
                                                <th className="px-4 py-3 font-semibold">Test Name</th>
                                                <th className="px-4 py-3 font-semibold">Evaluation details</th>
                                                <th className="px-4 py-3 font-semibold text-center">Score</th>
                                                <th className="px-4 py-3 font-semibold text-right print:hidden">Actions</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-100">
                                            {testResults
                                                .filter(r => {
                                                    const isTestMatched = speechData.testId === '' ? true : r.testId === parseInt(speechData.testId);
                                                    const isMyCategory = myTests.some(t => t.id === r.testId); 
                                                    return isTestMatched && isMyCategory;
                                                })
                                                .map(result => {
                                                    const student = students.find(s => s.id === result.studentId);
                                                    const hasSpeech = result.speechMarks !== undefined && result.speechMarks > 0;
                                                    return (
                                                        <tr key={result.id} className="hover:bg-amber-50/30 transition-colors">
                                                            <td className="px-4 py-3">
                                                                <div className="font-bold text-slate-800">{student?.name}</div>
                                                                <div className="font-mono text-xs text-slate-400">#{result.studentId}</div>
                                                            </td>
                                                            <td className="px-4 py-3 text-xs text-slate-500 truncate max-w-[140px]">{result.testTitle}</td>
                                                            <td className="px-4 py-3 text-xs text-slate-600 whitespace-normal max-w-[200px]">
                                                                {hasSpeech ? (
                                                                    <div>
                                                                        <span className="font-extrabold text-amber-700">[{result.speechCategory || 'Metric'}]</span>
                                                                        <p className="italic text-slate-500 mt-0.5 line-clamp-2" title={result.speechDescription}>{result.speechDescription || 'No description comments added.'}</p>
                                                                    </div>
                                                                ) : (
                                                                    <span className="text-slate-300 italic">Unassigned</span>
                                                                )}
                                                            </td>
                                                            <td className="px-4 py-3 text-center">
                                                                {hasSpeech ? (
                                                                    <span className="font-bold font-mono text-amber-600 bg-amber-50 px-2 py-1 rounded border border-amber-200">{result.speechMarks} Marks</span>
                                                                ) : (
                                                                    <span className="text-slate-300 font-bold">-</span>
                                                                )}
                                                            </td>
                                                            <td className="px-4 py-3 text-right print:hidden">
                                                                {hasSpeech ? (
                                                                    <div className="flex justify-end space-x-1">
                                                                        <button onClick={() => loadSpeechForEdit(result)} className="p-1 text-slate-400 hover:text-amber-600 hover:bg-amber-50 rounded transition" title="Modify Marks"><Edit size={14}/></button>
                                                                        <button onClick={() => handleSpeechDelete(result.id)} className="p-1 text-slate-400 hover:text-rose-600 hover:bg-rose-50 rounded transition" title="Delete Marks"><Trash2 size={14}/></button>
                                                                    </div>
                                                                ) : (
                                                                    <span className="text-[10px] text-slate-400 italic">No entry</span>
                                                                )}
                                                            </td>
                                                        </tr>
                                                    );
                                                })}
                                            {testResults.length === 0 && <tr><td colSpan="5" className="text-center py-8 text-slate-500">No records found.</td></tr>}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        function ProfileTab({ currentUser, users, setUsers, logActivity, setCurrentUser }) {
            const [passForm, setPassForm] = useState({ old: '', new: '' });
            const [msg, setMsg] = useState('');

            const handleChangePassword = (e) => {
                e.preventDefault();
                if(passForm.old === currentUser.password) {
                    setUsers(users.map(u => u.id === currentUser.id ? { ...u, password: passForm.new } : u));
                    setCurrentUser({ ...currentUser, password: passForm.new });
                    logActivity('User modified their own password.', 'info');
                    setPassForm({ old: '', new: '' });
                    setMsg('Password updated successfully!');
                    setTimeout(() => setMsg(''), 4000);
                } else {
                    alert('Authentication Failed: Incorrect current password.');
                }
            };

            return (
                <div className="space-y-6 animate-in fade-in duration-500 max-w-xl mx-auto">
                    <div>
                        <h2 className="text-3xl font-bold text-slate-800 tracking-tight">My Profile & Security</h2>
                        <p className="text-slate-500 mt-1">Manage your account credentials and personal settings.</p>
                    </div>

                    <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                        <div className="flex items-center space-x-4 mb-6 pb-6 border-b border-slate-100">
                            <div className="h-16 w-16 rounded-full bg-blue-100 flex items-center justify-center text-blue-600 font-bold text-xl">
                                {currentUser.name.charAt(0)}
                            </div>
                            <div>
                                <h3 className="text-xl font-bold text-slate-800">{currentUser.name}</h3>
                                <p className="text-slate-500 text-sm">@{currentUser.username} • {currentUser.role === 'super_admin' ? 'Administrator' : currentUser.role === 'teacher' ? 'Teacher' : 'Student'}</p>
                            </div>
                        </div>

                        <h3 className="text-sm font-bold uppercase tracking-wider text-slate-800 pb-3 mb-4 flex items-center">Change Password</h3>
                        
                        {msg && (
                            <div className="mb-4 p-3 bg-emerald-50 text-emerald-700 border border-emerald-200 rounded-lg text-sm flex items-center">
                                <CheckCircle size={16} className="mr-2" /> {msg}
                            </div>
                        )}

                        <form onSubmit={handleChangePassword} className="space-y-4 text-sm">
                            <div>
                                <label className="block font-semibold text-slate-600 mb-1">Current Password</label>
                                <input type="password" required value={passForm.old} onChange={e => setPassForm({...passForm, old: e.target.value})} className="w-full border border-slate-300 p-3 rounded-lg bg-slate-50 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Enter current password" />
                            </div>
                            <div>
                                <label className="block font-semibold text-slate-600 mb-1">New Password</label>
                                <input type="password" required value={passForm.new} onChange={e => setPassForm({...passForm, new: e.target.value})} className="w-full border border-slate-300 p-3 rounded-lg bg-slate-50 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Enter new password" />
                            </div>
                            <button type="submit" className="w-full bg-blue-600 text-white p-3 rounded-lg hover:bg-blue-700 font-bold transition shadow-md mt-4">
                                Update Secure Password
                            </button>
                        </form>
                    </div>
                </div>
            );
        }

        // --- EXPORT SIGNALS ---
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
