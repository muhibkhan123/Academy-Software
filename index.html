<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academy Management Portal</title>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel for in-browser JSX transpilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom Scrollbar styling from original code */
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background-color: #cbd5e1;
            border-radius: 20px;
        }
        
        /* Print media queries optimizations */
        @media print {
            body { background: white !important; }
            .print\:hidden { display: none !important; }
            .print\:shadow-none { box-shadow: none !important; }
            .print\:border-none { border: none !important; }
            .print\:p-0 { padding: 0 !important; }
        }

        /* Prevent user text selection to secure source materials */
        .no-select {
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased no-select">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const IconWrapper = ({ size = 24, className = "", children }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                {children}
            </svg>
        );

        const Users = (p) => <IconWrapper {...p}><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></IconWrapper>;
        const Settings = (p) => <IconWrapper {...p}><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></IconWrapper>;
        const FileText = (p) => <IconWrapper {...p}><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></IconWrapper>;
        const Download = (p) => <IconWrapper {...p}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></IconWrapper>;
        const Upload = (p) => <IconWrapper {...p}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></IconWrapper>;
        const LogOut = (p) => <IconWrapper {...p}><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></IconWrapper>;
        const Plus = (p) => <IconWrapper {...p}><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></IconWrapper>;
        const Edit = (p) => <IconWrapper {...p}><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></IconWrapper>;
        const Trash2 = (p) => <IconWrapper {...p}><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></IconWrapper>;
        const ShieldCheck = (p) => <IconWrapper {...p}><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><polyline points="9 12 11 14 15 10"/></IconWrapper>;
        const Activity = (p) => <IconWrapper {...p}><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></IconWrapper>;
        const BookOpen = (p) => <IconWrapper {...p}><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></IconWrapper>;
        const DollarSign = (p) => <IconWrapper {...p}><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></IconWrapper>;
        const Printer = (p) => <IconWrapper {...p}><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></IconWrapper>;
        const UserPlus = (p) => <IconWrapper {...p}><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></IconWrapper>;
        const Search = (p) => <IconWrapper {...p}><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></IconWrapper>;
        const Eye = (p) => <IconWrapper {...p}><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></IconWrapper>;
        const CheckCircle = (p) => <IconWrapper {...p}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></IconWrapper>;
        const AlertCircle = (p) => <IconWrapper {...p}><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></IconWrapper>;
        const FileDigit = (p) => <IconWrapper {...p}><path d="M4 22h14a2 2 0 0 0 2-2V7.5L14.5 2H6a2 2 0 0 0-2 2v4"/><polyline points="14 2 14 8 20 8"/><rect x="2" y="12" width="4" height="6" rx="1"/><path d="M10 12v6"/><path d="M10 12h2"/><path d="M10 18h2"/></IconWrapper>;
        const Calendar = (p) => <IconWrapper {...p}><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></IconWrapper>;
        const ClipboardList = (p) => <IconWrapper {...p}><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><path d="M12 11h4"/><path d="M12 16h4"/><path d="M8 11h.01"/><path d="M8 16h.01"/></IconWrapper>;
        const GraduationCap = (p) => <IconWrapper {...p}><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></IconWrapper>;
        const PlayCircle = (p) => <IconWrapper {...p}><circle cx="12" cy="12" r="10"/><polygon points="10 8 16 12 10 16 10 8"/></IconWrapper>;
        const Award = (p) => <IconWrapper {...p}><circle cx="12" cy="8" r="7"/><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"/></IconWrapper>;
        const Shield = (p) => <IconWrapper {...p}><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></IconWrapper>;
        const Briefcase = (p) => <IconWrapper {...p}><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></IconWrapper>;

        // --- MAIN APP COMPONENT ---
        const App = () => {
            // --- BROWSER LOCAL STORAGE AUTO-SAVE LOGIC ---
            const loadData = (key, defaultValue) => {
                const saved = localStorage.getItem(key);
                if (saved) {
                    try { return JSON.parse(saved); } catch(e) { console.error("Error parsing " + key, e); }
                }
                return defaultValue;
            };

            // --- PERMISSIONS HELPER ---
            const hasPerm = (user, permKey) => {
                if (!user) return false;
                if (user.role === 'super_admin') return true; 
                if (!user.permissions) {
                    return permKey.includes('Read') || permKey === 'studentsWrite'; 
                }
                return !!user.permissions[permKey];
            };

            // --- LOCAL STORAGE STATES ---
            const [currentUser, setCurrentUser] = useState(() => loadData('tca_currentUser', null));
            const [activeTab, setActiveTab] = useState(() => loadData('tca_activeTab', 'dashboard'));
            
            // Dynamic Subjects
            const [subjects, setSubjects] = useState(() => loadData('tca_subjects', [
                'Trading Masterclass', 
                'Computer Science', 
                'English Language', 
                'General Subject / Other'
            ]));

            // Global Academy Configurations
            const [academySettings, setAcademySettings] = useState(() => loadData('tca_settings', {
                name: 'The Chargh Academy',
                tagline: 'English Language & Computer Education Center',
                address: 'Main Commercial Area, Bannu, KP',
                email: 'info@charghacademy.edu',
                mobile: '+92 300 1234567',
                logo: 'https://via.placeholder.com/150/1e3a8a/ffffff?text=TCA'
            }));

            // User Accounts state
            const [users, setUsers] = useState(() => loadData('tca_users', [
                { id: 1, username: 'admin', password: '123', role: 'super_admin', name: 'System Administrator', email: 'admin@tca.edu',
                  permissions: { viewRevenue: true, studentsRead: true, studentsWrite: true, studentsDelete: true, feesRead: true, feesWrite: true, assessmentsRead: true, assessmentsWrite: true } },
                { id: 2, username: 'teacher', password: '123', role: 'teacher', name: 'John Doe', email: 'john@tca.edu', category: 'Computer Science',
                  permissions: { viewRevenue: false, studentsRead: true, studentsWrite: true, studentsDelete: false, feesRead: false, feesWrite: false, assessmentsRead: true, assessmentsWrite: true } },
                { id: 3, username: 'std_1001', password: '123', role: 'student', name: 'Alice Smith', studentId: 1001 }
            ]));

            // Enrolled Students
            const [students, setStudents] = useState(() => loadData('tca_students', [
                { id: 1001, name: 'Alice Smith', fname: 'Robert Smith', phone: '+92 333 0000000', gender: 'Female', category: 'Computer Science', duration: '3 Months', totalFee: 15000, discount: 1000, paid: 10000, enrollDate: '2026-06-01', status: 'Active' },
                { id: 1002, name: 'Michael Johnson', fname: 'David Johnson', phone: '+92 345 1111111', gender: 'Male', category: 'English Language', duration: '6 Months', totalFee: 20000, discount: 0, paid: 20000, enrollDate: '2026-06-02', status: 'Active' },
                { id: 1003, name: 'Sarah Williams', fname: 'James Williams', phone: '+92 321 2222222', gender: 'Female', category: 'Trading Masterclass', duration: '1 Month', totalFee: 50000, discount: 5000, paid: 20000, enrollDate: '2026-06-03', status: 'Active' }
            ]));

            // Question Pool
            const [mcqBank, setMcqBank] = useState(() => loadData('tca_mcqBank', [
                { id: 1, subject: 'Computer Science', q: 'What does RAM stand for?', options: ['Read Access Memory', 'Random Access Memory', 'Run Active Memory', 'Random Active Memory'], correct: 1 },
                { id: 2, subject: 'Computer Science', q: 'Which of the following is an input device?', options: ['Monitor', 'Printer', 'Keyboard', 'Speaker'], correct: 2 },
                { id: 3, subject: 'English Language', q: 'Which of these is a correct synonym of "Generous"?', options: ['Selfish', 'Greedy', 'Benevolent', 'Stingy'], correct: 2 },
                { id: 4, subject: 'English Language', q: 'What is the past tense of "Go"?', options: ['Went', 'Gone', 'Going', 'Goes'], correct: 0 },
                { id: 5, subject: 'Trading Masterclass', q: 'What is a candlestick chart used for in trading?', options: ['To track temperatures', 'To display price movements over time', 'To see candle volumes', 'To trade real candles'], correct: 1 }
            ]));

            // Published assessments
            const [tests, setTests] = useState(() => loadData('tca_tests', [
                { 
                    id: 1, title: 'Computer Science Basics Phase 1', category: 'Computer Science', 
                    startDate: new Date().toISOString().split('T')[0], startTime: '00:00',
                    endDate: new Date(Date.now() + 86400000 * 7).toISOString().split('T')[0], endTime: '23:59',
                    timePerQuestion: 60, isPublished: true, enforceWindow: true,
                    questions: [
                        { q: 'What does RAM stand for?', options: ['Read Access Memory', 'Random Access Memory', 'Run Active Memory', 'Random Active Memory'], correct: 1, marks: 5 },
                        { q: 'Which of the following is an input device?', options: ['Monitor', 'Printer', 'Keyboard', 'Speaker'], correct: 2, marks: 5 }
                    ]
                }
            ]));
            const [testResults, setTestResults] = useState(() => loadData('tca_testResults', []));

            // Financial Transactions database
            const [transactions, setTransactions] = useState(() => loadData('tca_transactions', [
                { id: 1, type: 'income', amount: 10000, category: 'Student Fees', description: 'Fee payment from student Alice Smith (Reg: #1001)', date: '2026-06-01' },
                { id: 2, type: 'income', amount: 20000, category: 'Student Fees', description: 'Fee payment from student Michael Johnson (Reg: #1002)', date: '2026-06-02' },
                { id: 3, type: 'income', amount: 20000, category: 'Student Fees', description: 'Fee payment from student Sarah Williams (Reg: #1003)', date: '2026-06-03' },
                { id: 4, type: 'expense', amount: 12000, category: 'Building Rent', description: 'Monthly rent for the main academic branch', date: '2026-06-01' },
                { id: 5, type: 'expense', amount: 4500, category: 'Electricity Bill', description: 'May 2026 Power Bill', date: '2026-06-02' }
            ]));

            // System Logs
            const [logs, setLogs] = useState(() => loadData('tca_logs', [
                { id: 1, action: 'System Initialized successfully.', user: 'System', time: new Date().toLocaleString(), type: 'info' }
            ]));

            // --- LICENSING STATE ---
            const [isLicensed, setIsLicensed] = useState(() => {
                const activeKey = localStorage.getItem('tca_license_active');
                return activeKey === 'TCA-BANNU-LICENSE-2026-FREE' || activeKey === 'true';
            });
            const [licenseInput, setLicenseInput] = useState('');
            const [licenseError, setLicenseError] = useState('');

            // --- PWA (STANDALONE APPLICATION INSTALLATION) STATES ---
            const [deferredPrompt, setDeferredPrompt] = useState(null);
            const [isAppInstallable, setIsAppInstallable] = useState(false);

            useEffect(() => {
                // Block Right-Click Context Menu
                const preventRightClick = (e) => e.preventDefault();
                document.addEventListener('contextmenu', preventRightClick);

                // Block key combinations (F12, Ctrl+Shift+I, Ctrl+Shift+J, Ctrl+Shift+C, Ctrl+U)
                const preventInspect = (e) => {
                    if (
                        e.key === 'F12' ||
                        (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'i' || e.key === 'J' || e.key === 'j' || e.key === 'C' || e.key === 'c')) ||
                        (e.ctrlKey && (e.key === 'U' || e.key === 'u'))
                    ) {
                        e.preventDefault();
                        return false;
                    }
                };
                window.addEventListener('keydown', preventInspect);

                // Listen for PWA installer trigger
                const handleBeforeInstall = (e) => {
                    e.preventDefault();
                    setDeferredPrompt(e);
                    setIsAppInstallable(true);
                };
                window.addEventListener('beforeinstallprompt', handleBeforeInstall);

                return () => {
                    document.removeEventListener('contextmenu', preventRightClick);
                    window.removeEventListener('keydown', preventInspect);
                    window.removeEventListener('beforeinstallprompt', handleBeforeInstall);
                };
            }, []);

            // --- REAL-TIME AUTO SAVE HOOK ---
            useEffect(() => {
                localStorage.setItem('tca_settings', JSON.stringify(academySettings));
                localStorage.setItem('tca_users', JSON.stringify(users));
                localStorage.setItem('tca_students', JSON.stringify(students));
                localStorage.setItem('tca_subjects', JSON.stringify(subjects));
                localStorage.setItem('tca_mcqBank', JSON.stringify(mcqBank));
                localStorage.setItem('tca_tests', JSON.stringify(tests));
                localStorage.setItem('tca_testResults', JSON.stringify(testResults));
                localStorage.setItem('tca_transactions', JSON.stringify(transactions));
                localStorage.setItem('tca_logs', JSON.stringify(logs));
            }, [academySettings, users, students, subjects, mcqBank, tests, testResults, transactions, logs]);

            // Save Session State
            useEffect(() => {
                localStorage.setItem('tca_currentUser', JSON.stringify(currentUser));
                localStorage.setItem('tca_activeTab', JSON.stringify(activeTab));
            }, [currentUser, activeTab]);

            // Auth States
            const [loginUsername, setLoginUsername] = useState('');
            const [loginPassword, setLoginPassword] = useState('');
            const [captchaAnswer, setCaptchaAnswer] = useState('');
            const [num1, setNum1] = useState(Math.floor(Math.random() * 10) + 1);
            const [num2, setNum2] = useState(Math.floor(Math.random() * 10) + 1);
            const [loginError, setLoginError] = useState('');

            // Forgot Password States
            const [showForgotPass, setShowForgotPass] = useState(false);
            const [forgotUsername, setForgotUsername] = useState('');
            const [forgotNewPass, setForgotNewPass] = useState('');
            const [forgotMsg, setForgotMsg] = useState({ text: '', type: '' });

            // --- HELPER FUNCTIONS ---
            const logActivity = (action, type = 'info', username = currentUser?.username) => {
                const newLog = { id: Date.now(), action, user: username, time: new Date().toLocaleString(), type };
                setLogs([newLog, ...logs]);
            };

            const handleLogin = (e) => {
                e.preventDefault();
                if (parseInt(captchaAnswer) !== num1 + num2) {
                    setLoginError('Invalid security captcha. Please try again.');
                    setCaptchaAnswer('');
                    return;
                }
                const user = users.find(u => u.username === loginUsername && u.password === loginPassword);
                if (user) {
                    setCurrentUser(user);
                    setLoginError('');
                    if (user.role === 'student') setActiveTab('student_portal');
                    else setActiveTab('dashboard');
                    logActivity('User logged into the system.', 'success', user.username);
                } else {
                    setLoginError('Invalid username or password provided.');
                    setNum1(Math.floor(Math.random() * 10) + 1);
                    setNum2(Math.floor(Math.random() * 10) + 1);
                    setCaptchaAnswer('');
                }
            };

            const handleLogout = () => {
                logActivity('User logged out of the system.', 'info');
                setCurrentUser(null);
                setActiveTab('dashboard'); // Reset tab for next user
                setLoginUsername('');
                setLoginPassword('');
                setCaptchaAnswer('');
                setNum1(Math.floor(Math.random() * 10) + 1);
                setNum2(Math.floor(Math.random() * 10) + 1);
            };

            const handleForgotPassword = (e) => {
                e.preventDefault();
                const userIndex = users.findIndex(u => u.username === forgotUsername);
                if (userIndex !== -1) {
                    const newUsers = [...users];
                    newUsers[userIndex].password = forgotNewPass;
                    setUsers(newUsers);
                    setForgotMsg({ text: 'Password reset successfully! You can now login.', type: 'success' });
                    logActivity(`Password reset via Forgot Password for user: ${forgotUsername}`, 'warning');
                    setForgotUsername('');
                    setForgotNewPass('');
                } else {
                    setForgotMsg({ text: 'Username not found in the system.', type: 'error' });
                }
            };

            // --- EXPORT FUNCTIONS ---
            const exportToExcel = () => {
                const headers = ['Reg ID', 'Student Name', 'Father Name', 'Phone', 'Gender', 'Course', 'Duration', 'Total Fee', 'Discount', 'Paid', 'Arrears', 'Enroll Date'];
                const csvRows = [];
                csvRows.push(headers.join(','));

                students.forEach(s => {
                    const arrears = s.totalFee - s.discount - s.paid;
                    const values = [s.id, `"${s.name}"`, `"${s.fname}"`, s.phone, s.gender, `"${s.category}"`, s.duration, s.totalFee, s.discount, s.paid, arrears, s.enrollDate];
                    csvRows.push(values.join(','));
                });

                const csvData = csvRows.join('\n');
                const blob = new Blob([csvData], { type: 'text/csv;charset=utf-8;' });
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.setAttribute('hidden', '');
                a.setAttribute('href', url);
                a.setAttribute('download', `TCA_Student_Report_${new Date().toISOString().split('T')[0]}.csv`);
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                logActivity('Exported student database to CSV/Excel.', 'success');
            };

            const exportToPDF = () => {
                window.print();
                logActivity('Printed/Exported system reports to PDF.', 'success');
            };

            const backupData = () => {
                const data = { settings: academySettings, users, students, subjects, mcqBank, tests, testResults, transactions, logs, backupDate: new Date().toISOString() };
                const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `TCA_System_Backup_${new Date().toISOString().split('T')[0]}.json`;
                a.click();
                logActivity('Downloaded complete system database backup.', 'warning');
            };

            // --- RESTORE JSON DATA FUNCTION ---
            const restoreDatabase = (parsedData) => {
                if(parsedData.settings) setAcademySettings(parsedData.settings);
                if(parsedData.users) setUsers(parsedData.users);
                if(parsedData.students) setStudents(parsedData.students);
                if(parsedData.subjects) setSubjects(parsedData.subjects);
                if(parsedData.mcqBank) setMcqBank(parsedData.mcqBank);
                if(parsedData.tests) setTests(parsedData.tests);
                if(parsedData.testResults) setTestResults(parsedData.testResults);
                if(parsedData.transactions) setTransactions(parsedData.transactions);
                if(parsedData.logs) setLogs(parsedData.logs);
                
                logActivity('System database completely restored from JSON backup file.', 'warning');
                alert('Database Restored Successfully! All records have been updated.');
            };

            // --- LICENSE VALIDATION HANDLER ---
            const handleActivateLicense = (e) => {
                e.preventDefault();

                        date: new Date().toISOString().split('T')[0]
                    };

                    const arrearsAfter = (payModal.totalFee - payModal.discount - payModal.paid) - amount;
                    setReceiptData({
                        receiptNo: `REC-${Date.now().toString().slice(-6)}`,

                        regId: payModal.id,
                        course: payModal.category,

        function SettingsTab({ settings, setSettings, users, setUsers, backupData, restoreDatabase, logActivity, currentUser, setCurrentUser, subjects, setSubjects, setIsLicensed }) {
            const [passForm, setPassForm] = useState({ old: '', new: '' });
            const [newUser, setNewUser] = useState({ username: '', password: '', role: 'teacher', name: '', email: '', category: subjects[0] || 'Computer Science' });
            const [permUser, setPermUser] = useState(null);

            // Subject Management States
            const [newSubjectName, setNewSubjectName] = useState('');

            const handleSettingsSave = (e) => {
                e.preventDefault();
                logActivity('Updated global academy configurations.', 'warning');
                alert('Global Settings Successfully Updated!');
            };

            const handleAddUser = (e) => {
                e.preventDefault();
                const isUsernameTaken = users.some(u => u.username === newUser.username);
                if(isUsernameTaken) return alert('Error: Username already exists in the system.');
                
                const newPerms = newUser.role === 'super_admin' ? 
                    { viewRevenue: true, studentsRead: true, studentsWrite: true, studentsDelete: true, feesRead: true, feesWrite: true, assessmentsRead: true, assessmentsWrite: true } :
                    { viewRevenue: false, studentsRead: true, studentsWrite: false, studentsDelete: false, feesRead: false, feesWrite: false, assessmentsRead: true, assessmentsWrite: true };

                setUsers([...users, { ...newUser, id: Date.now(), permissions: newPerms }]);
                logActivity(`Provisioned new system account: ${newUser.username} (${newUser.role})`, 'warning');
                setNewUser({ username: '', password: '', role: 'teacher', name: '', email: '', category: subjects[0] || 'Computer Science' });
                alert('New User Account Created Successfully!');
            };

            const handleChangePassword = (e) => {
                e.preventDefault();
                if(passForm.old === currentUser.password) {
                    setUsers(users.map(u => u.id === currentUser.id ? { ...u, password: passForm.new } : u));
                    setCurrentUser({ ...currentUser, password: passForm.new });
                    logActivity('User modified their own password.', 'info');
                    setPassForm({ old: '', new: '' });
                    alert('Security Credentials Updated.');
                } else {
                    alert('Authentication Failed: Incorrect current password.');
                }
            };

            const deleteUser = (id, username) => {
                if(id === currentUser.id) return alert('Operation Denied: You cannot delete your currently active account.');
                if(window.confirm(`SECURITY WARNING: Are you sure you want to revoke access and delete account "${username}"?`)) {
                    setUsers(users.filter(u => u.id !== id));
                    logActivity(`Deleted system user account: ${username}`, 'error');
                }
            };

            const handlePermToggle = (permKey) => {
                setPermUser({
                    ...permUser,
                    permissions: {
                        ...permUser.permissions,
                        [permKey]: !permUser.permissions[permKey]
                    }
                });
            };

            const savePermissions = () => {
                setUsers(users.map(u => u.id === permUser.id ? permUser : u));
                setPermUser(null);
                logActivity(`Updated module permissions for user ${permUser.username}`, 'warning');
            };

            // Dynamic Subject CRUD Handlers
            const handleAddSubject = (e) => {
                e.preventDefault();
                const trimmed = newSubjectName.trim();
                if (!trimmed) return;
                if (subjects.includes(trimmed)) return alert("This subject is already registered!");
                
                setSubjects([...subjects, trimmed]);
                logActivity(`Added new Course Subject Category: ${trimmed}`, 'warning');
                setNewSubjectName('');
            };

            const handleRenameSubjectPrompt = (oldName) => {
                const newName = prompt(`Enter new name for subject "${oldName}":`, oldName);
                if (newName && newName.trim() !== '' && newName.trim() !== oldName) {
                    const trimmed = newName.trim();
                    if (subjects.includes(trimmed)) return alert("Target subject name already exists!");
                    
                    setSubjects(subjects.map(s => s === oldName ? trimmed : s));
                    logActivity(`Renamed Course Subject from "${oldName}" to "${trimmed}"`, 'warning');
                }
            };

            const handleDeleteSubject = (name) => {
                if (window.confirm(`Warning: Deleting the subject "${name}" will remove it from future drop-down selectors. Any students enrolled in this course will still display their static records but new registrations will lose access. Confirm deletion?`)) {
                    setSubjects(subjects.filter(s => s !== name));
                    logActivity(`Deleted Course Subject Category: ${name}`, 'error');
                }
            };

            // License Reset Payouts
            const handleRevokeLicence = () => {
                if(window.confirm("WARNING: Software activation status reset karny se computer lock ho jayga. Kya aap licence deactivate karna chahty hain?")) {
                    localStorage.removeItem('tca_license_active');
                    setIsLicensed(false);
                    logActivity('Licence key manually revoked. Computer locked.', 'error', 'Licence Manager');
                }
            };

            return (
                <div className="space-y-8 animate-in fade-in duration-500 font-sans">
                    <div>
                        <h2 className="text-3xl font-bold text-slate-800 tracking-tight">System Configuration</h2>
                        <p className="text-slate-500 mt-1">Super Admin control panel for global settings, courses, and user management.</p>
                    </div>
                    
                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                        <div className="space-y-8 lg:col-span-1">
                            <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                                <h3 className="text-sm font-bold uppercase tracking-wider text-slate-800 border-b border-slate-100 pb-3 mb-4 flex items-center"><Settings size={16} className="mr-2 text-slate-400"/> Academy Profile</h3>
                                <form onSubmit={handleSettingsSave} className="space-y-4 text-sm">
                                    <div>
                                        <label className="block font-semibold text-slate-600 mb-1">Institution Name</label>
                                        <input type="text" value={settings.name} onChange={e => setSettings({...settings, name: e.target.value})} className="w-full border border-slate-300 p-2 rounded-lg bg-slate-50 focus:ring-2 focus:ring-blue-500 outline-none text-xs" />
                                    </div>
                                    <div>
                                        <label className="block font-semibold text-slate-600 mb-1">Tagline / Subtitle</label>
                                        <input type="text" value={settings.tagline} onChange={e => setSettings({...settings, tagline: e.target.value})} className="w-full border border-slate-300 p-2 rounded-lg bg-slate-50 focus:ring-2 focus:ring-blue-500 outline-none text-xs" />
                                    </div>
                                    <div>
                                        <label className="block font-semibold text-slate-600 mb-1">Contact Email</label>
                                        <input type="email" value={settings.email} onChange={e => setSettings({...settings, email: e.target.value})} className="w-full border border-slate-300 p-2 rounded-lg bg-slate-50 focus:ring-2 focus:ring-blue-500 outline-none text-xs" />
                                    </div>
                                    <div>
                                        <label className="block font-semibold text-slate-600 mb-1">Official Phone</label>
                                        <input type="text" value={settings.mobile} onChange={e => setSettings({...settings, mobile: e.target.value})} className="w-full border border-slate-300 p-2 rounded-lg bg-slate-50 focus:ring-2 focus:ring-blue-500 outline-none text-xs" />
                                    </div>
                                    <div>
                                        <label className="block font-semibold text-slate-600 mb-1">Physical Address</label>
                                        <textarea rows="2" value={settings.address} onChange={e => setSettings({...settings, address: e.target.value})} className="w-full border border-slate-300 p-2 rounded-lg bg-slate-50 focus:ring-2 focus:ring-blue-500 outline-none resize-none text-xs"></textarea>
                                    </div>
                                    
                                    <div>
                                        <label className="block font-semibold text-slate-600 mb-1">Upload Academy Logo (PNG, JPG, JPEG)</label>
                                        <div className="flex items-center gap-3 p-2 bg-slate-50 border border-slate-200 rounded-lg">
                                            {settings.logo && (
                                                <img 
                                                    src={settings.logo} 
                                                    alt="Logo Preview" 
                                                    className="h-10 w-10 rounded-full object-cover border border-slate-300 bg-white" 
                                                    onError={(e) => {
                                                        e.target.src = 'https://placehold.co/100x100/1e3a8a/ffffff?text=TCA';
                                                    }}
                                                />
                                            )}
                                            <input 
                                                type="file" 
                                                accept="image/png, image/jpeg, image/jpg" 
                                                onChange={e => {
                                                    const file = e.target.files[0];
                                                    if (file) {
                                                        if (file.size > 2 * 1024 * 1024) {
                                                            alert("Image size should be less than 2MB to keep system memory light.");
                                                            return;
                                                        }
                                                        const reader = new FileReader();
                                                        reader.onload = (evt) => {
                                                            setSettings({...settings, logo: evt.target.result});
                                                        };
                                                        reader.readAsDataURL(file);
                                                    }
                                                }} 
                                                className="flex-1 text-xs text-slate-500 file:mr-3 file:py-1.5 file:px-3 file:rounded-lg file:border-0 file:text-xs file:font-bold file:bg-blue-100 file:text-blue-800 hover:file:bg-blue-200 cursor-pointer" 
                                            />
                                        </div>
                                    </div>
                                    <button type="submit" className="w-full bg-slate-800 text-white p-2.5 rounded-lg hover:bg-slate-900 font-bold transition text-xs shadow-sm mt-2">Save Profile</button>
                                </form>
                            </div>

                            {/* Dynamically Manage Subjects/Courses */}
                            <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                                <h3 className="text-sm font-bold uppercase tracking-wider text-slate-800 border-b border-slate-100 pb-3 mb-4 flex items-center">📚 Subjects & Course Management</h3>
                                <form onSubmit={handleAddSubject} className="flex gap-2 mb-4">
                                    <input type="text" value={newSubjectName} onChange={e => setNewSubjectName(e.target.value)} placeholder="New Subject name" required className="flex-1 border border-slate-300 p-2 rounded-lg text-xs bg-slate-50 focus:ring-2 focus:ring-blue-500 outline-none" />
                                    <button type="submit" className="bg-blue-600 text-white px-3 py-2 rounded-lg text-xs font-bold hover:bg-blue-700 transition">Add</button>
                                </form>
                                <div className="divide-y divide-slate-100 border border-slate-200 rounded-lg max-h-60 overflow-y-auto custom-scrollbar">
                                    {subjects.map((sub, sIdx) => (
                                        <div key={sIdx} className="p-3 flex justify-between items-center bg-slate-50 hover:bg-white transition-colors">
                                            <span className="font-semibold text-xs text-slate-700">{sub}</span>
                                            <div className="flex space-x-2">
                                                <button type="button" onClick={() => handleRenameSubjectPrompt(sub)} className="text-xs text-amber-600 hover:text-amber-800 font-bold">Rename</button>
                                                <button type="button" onClick={() => handleDeleteSubject(sub)} className="text-xs text-rose-600 hover:text-rose-800 font-bold">Delete</button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>

                            {/* Dynamic Computer Node licensing overview */}
                            <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 text-slate-800">
                                <h3 className="text-sm font-bold uppercase tracking-wider text-slate-800 border-b border-slate-100 pb-3 mb-4 flex items-center">🔑 Computer node licensing</h3>
                                <div className="space-y-3 text-xs">
                                    <p className="flex justify-between"><span>Status:</span> <strong className="text-emerald-600 font-sans">ACTIVE LICENSE</strong></p>
                                    <p className="flex justify-between"><span>Bound to device:</span> <strong className="font-mono">LOCAL NODE #1</strong></p>
                                    <p className="flex justify-between"><span>Expires:</span> <strong className="text-slate-500 font-mono">NEVER (LIFETIME)</strong></p>
                                    <button type="button" onClick={handleRevokeLicence} className="w-full bg-rose-600 hover:bg-rose-700 text-white font-bold p-2 rounded-lg text-center tracking-wide transition-all mt-2 text-xs">
                                        Deactivate Node Licence
                                    </button>
                                </div>
                            </div>

                            <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                                <h3 className="text-sm font-bold uppercase tracking-wider text-slate-800 border-b border-slate-100 pb-3 mb-4 flex items-center"><ShieldCheck size={16} className="mr-2 text-slate-400"/> My Security</h3>
                                <form onSubmit={handleChangePassword} className="space-y-4 text-sm">
                                    <div>
                                        <label className="block font-semibold text-slate-600 mb-1">Current Password</label>
                                        <input type="password" required value={passForm.old} onChange={e => setPassForm({...passForm, old: e.target.value})} className="w-full border border-slate-300 p-2 rounded-lg bg-slate-50 focus:ring-2 focus:ring-blue-500 outline-none text-xs" />
                                    </div>
                                    <div>
                                        <label className="block font-semibold text-slate-600 mb-1">New Password</label>
                                        <input type="password" required value={passForm.new} onChange={e => setPassForm({...passForm, new: e.target.value})} className="w-full border border-slate-300 p-2 rounded-lg bg-slate-50 focus:ring-2 focus:ring-blue-500 outline-none text-xs" />
                                    </div>
                                    <button type="submit" className="w-full bg-amber-500 text-white p-2.5 rounded-lg hover:bg-amber-600 font-bold transition text-xs shadow-sm mt-2">Update Credentials</button>
                                </form>
                            </div>
                        </div>

                        <div className="lg:col-span-2 space-y-8">
                            <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                                <div className="p-6 border-b border-slate-100 bg-slate-50/50">
                                    <h3 className="text-sm font-bold uppercase tracking-wider text-slate-800 flex items-center"><UserPlus size={16} className="mr-2 text-slate-400"/> Staff & Role Management</h3>
                                    <p className="text-xs text-slate-500 mt-1">Add teachers or administrators and explicitly control their read/write/delete access rights.</p>
                                </div>
                                
                                <div className="p-6 flex flex-col md:flex-row gap-8">
                                    <form onSubmit={handleAddUser} className="flex-1 space-y-4 bg-slate-50 p-5 rounded-xl border border-slate-200">
                                        <h4 className="font-semibold text-sm text-slate-700 mb-2">Provision New Account</h4>
                                        <input type="text" placeholder="Staff Full Name" required value={newUser.name} onChange={e => setNewUser({...newUser, name: e.target.value})} className="w-full border border-slate-300 p-2 rounded-lg text-xs outline-none focus:ring-2 focus:ring-blue-500 bg-white" />
                                        <input type="email" placeholder="Email Address" value={newUser.email} onChange={e => setNewUser({...newUser, email: e.target.value})} className="w-full border border-slate-300 p-2 rounded-lg text-xs outline-none focus:ring-2 focus:ring-blue-500 bg-white" />
                                        <input type="text" placeholder="Login Username (Unique)" required value={newUser.username} onChange={e => setNewUser({...newUser, username: e.target.value})} className="w-full border border-slate-300 p-2 rounded-lg text-xs outline-none focus:ring-2 focus:ring-blue-500 font-mono bg-white" />
                                        <input type="password" placeholder="Initial Password" required value={newUser.password} onChange={e => setNewUser({...newUser, password: e.target.value})} className="w-full border border-slate-300 p-2 rounded-lg text-xs outline-none focus:ring-2 focus:ring-blue-500 bg-white" />
                                        <select value={newUser.role} onChange={e => setNewUser({...newUser, role: e.target.value})} className="w-full border border-slate-300 p-2 rounded-lg text-xs outline-none focus:ring-2 focus:ring-blue-500 bg-white">
                                            <option value="teacher">Faculty / Staff</option>
                                            <option value="super_admin">Super Administrator (Full Access)</option>
                                        </select>
                                        
                                        {newUser.role === 'teacher' && (
                                            <select value={newUser.category} onChange={e => setNewUser({...newUser, category: e.target.value})} className="w-full border border-slate-300 p-2 rounded-lg text-xs outline-none focus:ring-2 focus:ring-blue-500 bg-white">
                                                {subjects.map(c => <option key={c} value={c}>{c}</option>)}
                                            </select>
                                        )}
                                        
                                        <button type="submit" className="w-full bg-blue-600 text-white p-2.5 rounded-lg text-xs font-bold hover:bg-blue-700 transition shadow-sm mt-2">Create Account</button>
                                    </form>

                                    <div className="flex-[1.5] overflow-x-auto">
                                        <h4 className="font-semibold text-sm text-slate-700 mb-3">Active System Accounts</h4>
                                        <div className="border border-slate-200 rounded-xl overflow-hidden">
                                            <table className="min-w-full text-sm text-left whitespace-nowrap">
                                                <thead className="bg-slate-100 text-slate-600">
                                                    <tr>
                                                        <th className="p-3 font-semibold text-xs">User Details</th>
                                                        <th className="p-3 font-semibold text-xs">Role Level</th>
                                                        <th className="p-3 font-semibold text-xs text-right">Actions</th>
                                                    </tr>
                                                </thead>
                                                <tbody className="divide-y divide-slate-100 text-xs">
                                                    {users.filter(u => u.role !== 'student').map(u => (
                                                        <tr key={u.id} className="hover:bg-slate-50 transition-colors">
                                                            <td className="p-3">
                                                                <div className="font-bold text-slate-800">{u.name}</div>
                                                                <div className="text-[10px] text-slate-500 font-mono">@{u.username}</div>
                                                            </td>
                                                            <td className="p-3">
                                                                <span className={`px-2 py-0.5 rounded-md text-[10px] font-bold border ${u.role === 'super_admin' ? 'bg-purple-50 text-purple-700 border-purple-200' : 'bg-blue-50 text-blue-700 border-blue-200'}`}>
                                                                    {u.role === 'super_admin' ? 'Admin' : 'Staff'}
                                                                </span>
                                                                {u.role === 'teacher' && <div className="text-[9px] text-slate-500 mt-1">{u.category}</div>}
                                                            </td>
                                                            <td className="p-3 text-right">
                                                                {u.id !== currentUser.id && u.role !== 'super_admin' ? (
                                                                    <div className="flex justify-end space-x-1">
                                                                        <button onClick={() => {
                                                                            const userToEdit = {...u};
                                                                            if (!userToEdit.permissions) {
                                                                                userToEdit.permissions = { viewRevenue: false, studentsRead: true, studentsWrite: false, studentsDelete: false, feesRead: false, feesWrite: false, assessmentsRead: true, assessmentsWrite: true };
                                                                            }
                                                                            setPermUser(userToEdit);
                                                                        }} className="p-1.5 text-slate-500 hover:text-blue-600 hover:bg-blue-50 rounded transition" title="Manage Permissions"><Shield size={16} /></button>
                                                                        <button onClick={() => deleteUser(u.id, u.username)} className="p-1.5 text-slate-500 hover:text-rose-600 hover:bg-rose-50 rounded transition" title="Revoke Access"><Trash2 size={16}/></button>
                                                                    </div>
                                                                ) : (
                                                                    <span className="text-[10px] text-slate-400 italic">{u.id === currentUser.id ? 'Current' : 'Full Access'}</span>
                                                                )}
                                                            </td>
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            {permUser && (
                                <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-4 font-sans">
                                    <div className="bg-white rounded-2xl shadow-2xl w-full max-w-lg overflow-hidden animate-in zoom-in-95 duration-200">
                                        <div className="bg-slate-50 p-5 border-b border-slate-200 flex justify-between items-center">
                                            <div>
                                                <h3 className="font-bold text-slate-800 text-lg flex items-center"><ShieldCheck className="text-blue-600 mr-2"/> Access Permissions</h3>
                                                <p className="text-xs text-slate-500 mt-0.5">Managing rules for: <b>{permUser.name}</b></p>
                                            </div>
                                            <button onClick={() => setPermUser(null)} className="text-slate-400 hover:text-slate-800 bg-white border rounded-full p-1 shadow-sm">&times;</button>
                                        </div>
                                        <div className="p-6 space-y-6 max-h-[70vh] overflow-y-auto custom-scrollbar">
                                            <div className="border border-slate-200 rounded-xl overflow-hidden">
                                                <div className="bg-slate-100 p-3 font-semibold text-sm text-slate-700 flex items-center"><Activity size={16} className="mr-2"/> Dashboard Access</div>
                                                <div className="p-4 bg-white space-y-3">
                                                    <label className="flex items-center space-x-3 cursor-pointer">
                                                        <input type="checkbox" checked={permUser.permissions.viewRevenue} onChange={() => handlePermToggle('viewRevenue')} className="w-5 h-5 text-blue-600 rounded border-slate-300 focus:ring-blue-500 cursor-pointer" />
                                                        <span className="text-sm text-slate-700">View Revenue, Arrears & Financial Metrics</span>
                                                    </label>
                                                </div>
                                            </div>

                                            <div className="border border-slate-200 rounded-xl overflow-hidden">
                                                <div className="bg-slate-100 p-3 font-semibold text-sm text-slate-700 flex items-center"><Users size={16} className="mr-2"/> Student Directory</div>
                                                <div className="p-4 bg-white space-y-3">
                                                    <label className="flex items-center space-x-3 cursor-pointer">
                                                        <input type="checkbox" checked={permUser.permissions.studentsRead} onChange={() => handlePermToggle('studentsRead')} className="w-5 h-5 text-blue-600 rounded border-slate-300 focus:ring-blue-500 cursor-pointer" />
                                                        <span className="text-sm text-slate-700">View Students (Read Only)</span>
                                                    </label>
                                                    <label className="flex items-center space-x-3 cursor-pointer">
                                                        <input type="checkbox" checked={permUser.permissions.studentsWrite} onChange={() => handlePermToggle('studentsWrite')} className="w-5 h-5 text-blue-600 rounded border-slate-300 focus:ring-blue-500 cursor-pointer" />
                                                        <span className="text-sm text-slate-700">Add New & Edit Students</span>
                                                    </label>
                                                    <label className="flex items-center space-x-3 cursor-pointer">
                                                        <input type="checkbox" checked={permUser.permissions.studentsDelete} onChange={() => handlePermToggle('studentsDelete')} className="w-5 h-5 text-rose-600 rounded border-slate-300 focus:ring-rose-500 cursor-pointer" />
                                                        <span className="text-sm text-rose-700 font-medium">Delete Student Records</span>
                                                    </label>
                                                </div>
                                            </div>

                                            <div className="border border-slate-200 rounded-xl overflow-hidden">
                                                <div className="bg-slate-100 p-3 font-semibold text-sm text-slate-700 flex items-center"><DollarSign size={16} className="mr-2"/> Financial Control</div>
                                                <div className="p-4 bg-white space-y-3">
                                                    <label className="flex items-center space-x-3 cursor-pointer">
                                                        <input type="checkbox" checked={permUser.permissions.feesRead} onChange={() => handlePermToggle('feesRead')} className="w-5 h-5 text-blue-600 rounded border-slate-300 focus:ring-blue-500 cursor-pointer" />
                                                        <span className="text-sm text-slate-700">Access Fees Module (View Pending Dues)</span>
                                                    </label>
                                                    <label className="flex items-center space-x-3 cursor-pointer">
                                                        <input type="checkbox" checked={permUser.permissions.feesWrite} onChange={() => handlePermToggle('feesWrite')} className="w-5 h-5 text-blue-600 rounded border-slate-300 focus:ring-blue-500 cursor-pointer" />
                                                        <span className="text-sm text-slate-700">Process Fee Payments & Issue Receipts</span>
                                                    </label>
                                                </div>
                                            </div>

                                            <div className="border border-slate-200 rounded-xl overflow-hidden">
                                                <div className="bg-slate-100 p-3 font-semibold text-sm text-slate-700 flex items-center"><ClipboardList size={16} className="mr-2"/> Assessments</div>
                                                <div className="p-4 bg-white space-y-3">
                                                    <label className="flex items-center space-x-3 cursor-pointer">
                                                        <input type="checkbox" checked={permUser.permissions.assessmentsRead} onChange={() => handlePermToggle('assessmentsRead')} className="w-5 h-5 text-blue-600 rounded border-slate-300 focus:ring-blue-500 cursor-pointer" />
                                                        <span className="text-sm text-slate-700">View Tests & Results</span>
                                                    </label>
                                                    <label className="flex items-center space-x-3 cursor-pointer">
                                                        <input type="checkbox" checked={permUser.permissions.assessmentsWrite} onChange={() => handlePermToggle('assessmentsWrite')} className="w-5 h-5 text-blue-600 rounded border-slate-300 focus:ring-blue-500 cursor-pointer" />
                                                        <span className="text-sm text-slate-700">Create Tests, Manage Questions & Give Marks</span>
                                                    </label>
                                                </div>
                                            </div>
                                        </div>
                                        <div className="p-4 border-t border-slate-200 bg-slate-50 flex justify-end space-x-3 font-sans">
                                            <button onClick={() => setPermUser(null)} className="px-5 py-2.5 bg-white border border-slate-300 rounded-lg hover:bg-slate-100 text-slate-700 font-medium text-sm transition text-slate-700">Cancel</button>

        // --- STUDENT ASSESSMENT & MCQ INTERACTIVE TEST PORTAL COMPONENT ---
        function StudentPortalTab({ currentUser, students, tests, testResults, setTestResults, logActivity }) {
            const studentInfo = students.find(s => s.id === currentUser.studentId);
            const [activeTest, setActiveTest] = useState(null);
            const [currentQIndex, setCurrentQIndex] = useState(0);
            const [score, setScore] = useState(0);
            const [timeLeft, setTimeLeft] = useState(0);
            
            // Selection state for radio choice selection
            const [selectedAnswer, setSelectedAnswer] = useState(null);

            // Shuffling helper (Fisher-Yates) for Anti-Cheating
            const shuffleArray = (array) => {
                let arr = [...array];
                for (let i = arr.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [arr[i], arr[j]] = [arr[j], arr[i]];
                }
                return arr;
            };

            // Set time per question on change
            useEffect(() => {
                if (activeTest) {
                    setTimeLeft(activeTest.timePerQuestion || 60);
                    setSelectedAnswer(null); // Reset selection for the new question
                }
            }, [activeTest, currentQIndex]);

            // Realtime Countdown Timer
            useEffect(() => {
                if (!activeTest) return;
                
                if (timeLeft <= 0) {
                    handleNextQuestion();
                    return;
                }
                
                const timerId = setTimeout(() => setTimeLeft(prev => prev - 1), 1000);
                return () => clearTimeout(timerId);

            if (!studentInfo) return <div className="p-10 text-center text-rose-500 font-bold bg-white rounded-2xl shadow-sm border">Student profile link broken. Please contact administrator.</div>;

                    setScore(nextScore);
                    setCurrentQIndex(prev => prev + 1);

                    const testTotalMarks = activeTest.questions.reduce((sum, q) => sum + (Number(q.marks) || 1), 0);

                return now >= start && now <= end;

                    </div>

                        <div className="bg-gradient-to-br from-amber-100 to-orange-50 p-6 rounded-2xl shadow-sm border border-amber-200 flex flex-col items-center justify-center text-center">

        // --- UPGRADED ASSESSMENTS TAB WITH MCQ DATABASE BANK & IMPORT/EXPORT ---
        function AssessmentsTab({ tests, setTests, testResults, setTestResults, students, mcqBank, setMcqBank, logActivity, currentUser, hasPerm, subjects }) {
            const [activeSubTab, setActiveSubTab] = useState('manage'); // 'manage', 'mcq_bank', 'results', or 'speech'
            
            const defaultCategory = currentUser.role === 'teacher' ? currentUser.category : (subjects[0] || 'Computer Science');

            // New Test Building State
            const [newTest, setNewTest] = useState({ 
                title: '', category: defaultCategory, 
                startDate: '', startTime: '', endDate: '', endTime: '', timePerQuestion: 60,
                enforceWindow: true, isPublished: true,
                questions: [] 
            });
            const [showCreateForm, setShowCreateForm] = useState(false);
            const [testCreationMode, setTestCreationMode] = useState('mcq_bank'); // 'mcq_bank' or 'manual'

            // Manual MCQ Form State
            const [manualMcqForm, setManualMcqForm] = useState({
                subject: defaultCategory,
                q: '',
                options: ['', '', '', ''],
                correct: 0
            });

            // Filtering tests & results
            const myTests = currentUser.role === 'teacher' ? tests.filter(t => t.category === currentUser.category) : tests;
            const [selectedResultTest, setSelectedResultTest] = useState('All');
            
            // Speech Marks State (With Categories and Descriptions)
            const [speechData, setSpeechData] = useState({ testId: '', studentId: '', marks: '', category: 'Pronunciation & Accent', description: '' });
            const [isEditingSpeech, setIsEditingSpeech] = useState(false);

            const speechCategories = [
                'Pronunciation & Accent',
                'Fluency & Coherence',
                'Grammar & Accuracy',
                'Vocabulary & Lexical Resource',
                'Presentation & Public Speaking',
                'Confidence & Voice Projection'
            ];

            const canWrite = hasPerm(currentUser, 'assessmentsWrite');

            // --- BANK QUESTIONS SELECTION STATE ---
            const [selectedBankIds, setSelectedBankIds] = useState([]);

            // Toggle dynamic test status (Published/Unpublished)
            const togglePublishStatus = (id) => {
                setTests(tests.map(t => {
                    if (t.id === id) {
                        const nextStatus = t.isPublished === undefined ? false : !t.isPublished;
                        logActivity(`Toggled Assessment ID ${id} publish status to: ${nextStatus ? 'Published' : 'Draft'}`, 'warning');
                        return { ...t, isPublished: nextStatus };
                    }
                    return t;
                }));
            };

            // --- MCQ BANK FUNCTIONALITIES ---
            const handleAddMcqToBank = (e) => {
                e.preventDefault();
                const newId = mcqBank.length > 0 ? Math.max(...mcqBank.map(m => m.id)) + 1 : 1;
                const newMcq = { ...manualMcqForm, id: newId, correct: parseInt(manualMcqForm.correct) };
                setMcqBank([...mcqBank, newMcq]);
                logActivity(`Manually added new MCQ to Bank under "${manualMcqForm.subject}"`, 'success');
                setManualMcqForm({ subject: defaultCategory, q: '', options: ['', '', '', ''], correct: 0 });
                alert("Question added to the MCQ Bank!");
            };

            const handleDeleteMcqFromBank = (id) => {
                if (window.confirm("Are you sure you want to delete this question from the MCQ Bank?")) {
                    setMcqBank(mcqBank.filter(m => m.id !== id));
                    logActivity(`Deleted question ID: ${id} from MCQ Bank`, 'error');
                }
            };

            const handleJsonImport = (e) => {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const parsed = JSON.parse(event.target.result);
                        if (!Array.isArray(parsed)) {
                            throw new Error("JSON must be an array of MCQ objects.");
                        }

                        // Validate shape of imported array
                        const validated = parsed.map((item, idx) => {
                            if (!item.q || !Array.isArray(item.options) || item.options.length < 2 || item.correct === undefined) {
                                throw new Error(`Item at index ${idx} is missing required fields (q, options, correct).`);
                            }
                            return {
                                id: Date.now() + idx,
                                subject: item.subject || defaultCategory,
                                q: item.q,
                                options: item.options.slice(0, 4),
                                correct: parseInt(item.correct)
                            };
                        });

                        setMcqBank([...mcqBank, ...validated]);
                        logActivity(`Imported ${validated.length} MCQs via JSON file`, 'success');
                        alert(`Successfully imported ${validated.length} MCQs into your database!`);
                    } catch (err) {
                        alert(`Error Parsing JSON File: ${err.message}`);
                    }
                };
                reader.readAsText(file);
                e.target.value = null; // reset file input
            };

            const exportMcqBank = () => {
                const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(mcqBank, null, 2));
                const a = document.createElement('a');
                a.setAttribute("href", dataStr);
                a.setAttribute("download", `TCA_MCQ_Bank_${new Date().toISOString().split('T')[0]}.json`);
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                logActivity("Exported entire MCQ bank to JSON.", "info");
            };

            // --- TEST BUILDER FUNCTIONS ---
            const handleManualQuestionChange = (qIndex, field, value) => {
                const updatedQs = [...newTest.questions];
                if (field === 'q') updatedQs[qIndex].q = value;
                else if (field === 'correct') updatedQs[qIndex].correct = parseInt(value);
